<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rigor Portfolio — Portfolio Review Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <!-- SEO & Social -->
  <meta name="description" content="Get expert AI feedback on your portfolio to improve your chances of landing your next role." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://rigor.design/portfolio" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rigor.design/portfolio" />
  <meta property="og:title" content="Rigor Portfolio — Review Tool" />
  <meta property="og:description" content="Get expert AI feedback on your portfolio to improve your chances of landing your next role." />
  <meta property="og:image" content="https://rigor.design/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Rigor Portfolio — Review Tool" />
  <meta name="twitter:description" content="Get expert AI feedback on your portfolio to improve your chances of landing your next role." />
  <meta name="twitter:image" content="https://rigor.design/og-image.png" />

  <!-- Theme color -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1E3A5F" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav class="nav" aria-label="Main navigation">
    <a href="/" class="nav-brand">rigor<span>.</span>design</a>
    <div class="nav-links"><span class="plan-badge hidden" id="plan-badge"></span><a href="#" id="nav-login" class="nav-link">Sign In</a><button class="btn-upgrade-nav" id="nav-upgrade" class="btn-upgrade-nav nav-upgrade-hidden">⚡ Upgrade</button><button class="btn-icon" id="nav-manage" class="btn-icon nav-manage-hidden">Manage Plan</button><a href="#" id="nav-signup" class="btn-nav">Get Started</a></div>
  </nav>
  <div class="modal-overlay hidden" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close dialog">&times;</button>
      <div class="modal-tabs"><button class="tab-btn active" data-tab="login">Sign In</button><button class="tab-btn" data-tab="signup">Sign Up</button></div>
      <div class="tab-content" id="tab-login"><input type="email" class="input" id="login-email" placeholder="Email"/><input type="password" class="input" id="login-password" placeholder="Password"/><button class="btn-primary full" id="btn-login" aria-label="Sign in to your account">Sign In</button></div>
      <div class="tab-content hidden" id="tab-signup"><input type="text" class="input" id="signup-name" placeholder="Full Name"/><input type="email" class="input" id="signup-email" placeholder="Email"/><input type="password" class="input" id="signup-password" placeholder="Password"/><button class="btn-primary full" id="btn-signup" aria-label="Create a new account">Create Account</button></div>
      <p class="auth-error hidden" id="auth-error"></p>
    </div>
  </div>
  <section class="hero" id="main-content">
    <div class="hero-badge">Portfolio Review Tool</div>
    <h1 class="hero-title">Portfolio That<br/><em>Wins You Jobs</em></h1>
    <p class="hero-sub">Share your portfolio URL or describe your projects. Get detailed feedback tailored to your target role.</p>
  </section>
  <section class="tool-section" aria-label="Main tool"><div id="usage-meter-container"></div>
    <div class="tool-container">
      <div class="tool-panel">
        <div class="panel-header"><span class="panel-num">01</span><h2>Your Portfolio</h2></div>
        <input type="url" class="input" id="portfolio-url" placeholder="Portfolio URL (e.g. yourname.dev)"/>
        <p class="u-rigor_portfolio-1">— or describe your projects —</p>
        <textarea class="input textarea tall" id="portfolio-desc" placeholder="Describe your top 3-5 projects: what you built, technologies used, your role, and impact..."></textarea>
      </div>
      <div class="tool-panel">
        <div class="panel-header"><span class="panel-num">02</span><h2>Target Role</h2></div>
        <input type="text" class="input" id="target-role" placeholder="Target role (e.g. Frontend Engineer)"/>
        <input type="text" class="u-rigor_portfolio-2 input" id="target-company" placeholder="Target company type (e.g. startup, FAANG)"/>
        <select class="u-rigor_portfolio-3 input" id="career-stage">
          <option value="entry">Entry Level (0-2 years)</option>
          <option value="mid" selected>Mid Level (3-6 years)</option>
          <option value="senior">Senior (7+ years)</option>
        </select>
      </div>
      <div class="tool-actions">
        <button class="btn-primary large" id="btn-review"><span class="btn-text">Review My Portfolio</span><span class="btn-loader hidden">Reviewing...</span></button>
      </div>
      <div class="results hidden" id="results">
        <div class="score-card" id="score-display"></div>
        <div class="review-grid" id="review-grid"></div>
        <button class="btn-secondary" id="btn-save" aria-label="Save result">Save Review</button>
      </div>
    </div>
  </section>
  <footer class="footer"><p>© 2025 rigor.design</p></footer>
  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
